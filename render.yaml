services:
  - type: web
    name: mhs-server
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GMAIL_FROM
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RESET_EMAIL_TO
        sync: false
